name: Docker Image CI

on:
  push:
    branches: [ "release/*", "master" ]
    tags: "**"
jobs:
  racas:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          # list of Docker images to use as base name for tags
          images: |
            ${{ github.repository }}-oss
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Determine base image version
        id: base-image
        run: |
          # Sanitize ref name (same as rebuild-base-image.yml)
          REF_TAG="${GITHUB_REF_NAME//\//-}"

          # Check if ref-specific base image exists
          if docker manifest inspect mcneilco/acas-r-repo:${REF_TAG} > /dev/null 2>&1; then
            echo "version=${REF_TAG}" >> $GITHUB_OUTPUT
            echo "Using ref-specific base: ${REF_TAG}"
            exit 0
          fi

          # If on a tag, find which branch contains this commit
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "Tag detected, finding containing branch..."
            git fetch --quiet origin 'refs/heads/release/*:refs/remotes/origin/release/*' 'refs/heads/master:refs/remotes/origin/master' || true
            CONTAINING_BRANCH=$(git branch -r --contains HEAD 2>/dev/null | grep -E 'origin/(release/|master)' | head -1 | sed 's|.*origin/||' | tr '/' '-')
            if [ -n "$CONTAINING_BRANCH" ]; then
              echo "Found containing branch: ${CONTAINING_BRANCH}"
              if docker manifest inspect mcneilco/acas-r-repo:${CONTAINING_BRANCH} > /dev/null 2>&1; then
                echo "version=${CONTAINING_BRANCH}" >> $GITHUB_OUTPUT
                echo "Using branch containing tag: ${CONTAINING_BRANCH}"
                exit 0
              fi
            fi
          fi

          # Final fallback to master
          echo "version=master" >> $GITHUB_OUTPUT
          echo "Falling back to master"
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          file: Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          build-args: |
            REPO_IMAGE_VERSION=${{ steps.base-image.outputs.version }}
          cache-from: type=registry,ref=${{ github.repository }}-oss:cache
          cache-to: type=registry,ref=${{ github.repository }}-oss:cache,mode=max
